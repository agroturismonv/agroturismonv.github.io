<!DOCTYPE html>
<html lang="pt-BR" x-data="tourismTemplate()">

<head>
  <meta charset="UTF-8">

  <!-- Viewport correto para mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title x-text="t.title + ' | Turismo Nova Venécia'"></title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- AlpineJS -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Bandeiras -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" />

  <!-- DADOS DOS LOCAIS -->
  <script src="dados/controller/locais.js"></script>

  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .slider-img {
      width: 260px;
      height: 190px;
      object-fit: cover;
      flex-shrink: 0;
    }

    @media (min-width: 768px) {
      .slider-img {
        width: 300px;
        height: 210px;
      }
    }
  </style>
</head>

<body class="bg-gray-100 text-gray-800">

  <!-- ================= HEADER FIXO ================= -->
  <header class="bg-[#0f5132] text-white fixed w-full z-50 shadow-md">
    <div class="flex justify-between items-center px-4 py-3 md:px-10">

      <a href="index.html" class="flex items-center gap-2 max-w-[75%]">
        <img src="imagens/brasao/brasao_nv.png" alt="Logo" class="w-8 flex-shrink-0">

        <h1 class="text-sm min-[400px]:text-base md:text-xl font-black uppercase tracking-tight leading-tight">
          DESCOBRINDO O AGROTURISMO
        </h1>
      </a>

      <!-- Idiomas -->
      <div class="flex gap-3 flex-shrink-0">
        <button @click="lang = 'pt'" :class="lang === 'pt'? 'opacity-100 scale-110' : 'opacity-60'">
          <span class="fi fi-br"></span>
        </button>

        <button @click="lang = 'en'" :class="lang === 'en'? 'opacity-100 scale-110' : 'opacity-60'">
          <span class="fi fi-us"></span>
        </button>

        <button @click="lang = 'es'" :class="lang === 'es'? 'opacity-100 scale-110' : 'opacity-60'">
          <span class="fi fi-es"></span>
        </button>
      </div>
    </div>
  </header>

<section class="relative h-[40vh] flex items-center justify-center text-white overflow-hidden">

  <img :src="hero"
       class="absolute inset-0 w-full h-full object-cover brightness-[0.35]"
       alt="Hero">

  <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent"></div>

  <div class="relative z-10 text-center px-6 max-w-3xl mx-auto flex flex-col items-center justify-center h-full">
    <h2
      class="font-black uppercase italic mb-2 leading-tight break-words"
      style="font-size: clamp(1.6rem, 4vw, 4rem);"
      x-text="t.title">
    </h2>

    <p
      class="opacity-90 leading-relaxed"
      style="font-size: clamp(0.95rem, 2vw, 2rem);"
      x-text="t.subtitle">
    </p>
  </div>

</section>

  <!-- ================= CONTEÚDO ================= -->
  <main class="max-w-6xl mx-auto p-4 md:p-8 -mt-16 relative z-10 bg-white shadow-xl rounded-2xl">

    <div class="grid md:grid-cols-3 gap-8">

      <!-- TEXTO + GALERIA -->
      <div class="md:col-span-2">

        <h3 class="text-xl font-bold text-[#0f5132] mb-3 uppercase tracking-widest border-b pb-2" x-text="t.about"></h3>

        <p class="text-gray-600 leading-relaxed text-base" x-text="t.description"></p>

        <!-- GALERIA -->
        <h3 class="text-xl font-bold text-[#0f5132] mt-8 mb-4 uppercase tracking-widest" x-text="t.gallery"></h3>

        <div class="relative">
          <div class="flex overflow-x-auto gap-4 no-scrollbar snap-x snap-mandatory pb-3 scroll-smooth">
            <template x-for="(img, index) in gallery" :key="index">
              <div class="snap-start">
                <img :src="img" @click="openLightbox(index)"
                  class="slider-img rounded-xl shadow-md cursor-pointer hover:brightness-110 transition active:scale-95"
                  alt="Galeria">
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- AÇÕES -->
      <div class="flex flex-col gap-4">

        <!-- MAPA -->
        <button @click="showMap = true" class="w-full bg-[#0f5132] text-white py-5 rounded-2xl font-black
                     shadow-lg flex items-center justify-center gap-3
                     hover:bg-[#1a6b45] transition active:scale-95 uppercase">
          📍 <span x-text="t.location"></span>
        </button>

      <button x-show="RAvisionScreen" 
        @click="show360 = true"
        class="w-full bg-[#0f5132] text-white py-5 rounded-2xl font-black
               shadow-lg flex items-center justify-center gap-3
               hover:bg-[#1a6b45] transition active:scale-95 uppercase">
  📍 <span x-text="RAvisionButton"></span>
</button>


        <!-- QR CODE -->
        <div class="bg-gray-50 p-6 rounded-2xl border border-dashed border-gray-300 text-center">
          <p class="text-[10px] uppercase font-bold text-gray-400 mb-4 tracking-wide" x-text="t.qr"></p>

          <img :src="qr" class="mx-auto w-32 bg-white p-2 shadow-sm rounded-lg" alt="QR Code">
        </div>
      </div>

    </div>
  </main>

  <!-- ================= MODAL MAPA ================= -->
  <div x-show="showMap" x-transition.opacity
    class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm"
    @keydown.escape.window="showMap = false">

    <div class="bg-white rounded-3xl w-full max-w-5xl h-[85vh] flex flex-col shadow-2xl overflow-hidden"
      @click.away="showMap = false">

      <div class="p-4 flex justify-between items-center bg-gray-50 border-b">
        <span class="font-bold text-[#0f5132]" x-text="t.title"></span>

        <button @click="showMap = false" class="bg-gray-200 hover:bg-gray-300 w-10 h-10 rounded-full font-bold">
          ✕
        </button>
      </div>

      <iframe :src="mapEmbed" class="w-full h-full border-0" loading="lazy"></iframe>
    </div>
  </div>

<!-- ================= MODAL 360 ================= -->
<div x-show="show360"
     x-transition.opacity
     class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm"
     @keydown.escape.window="show360 = false">

    <div class="bg-white rounded-3xl w-full max-w-6xl h-[85vh] flex flex-col shadow-2xl overflow-hidden"
         @click.away="show360 = false">

        <div class="p-4 flex justify-between items-center bg-gray-50 border-b">
            <span class="font-bold text-[#0f5132]">
                Tour 360°
            </span>

            <button @click="show360 = false"
                    class="bg-gray-200 hover:bg-gray-300 w-10 h-10 rounded-full font-bold">
                ✕
            </button>
        </div>

        <div class="w-full h-full overflow-hidden">
            <iframe
                :src="tour360"
                class="w-full h-full border-0 -mt-16"
                loading="lazy"
                allowfullscreen>
            </iframe>
        </div>
    </div>
</div>

  <!-- ================= LIGHTBOX ================= -->
  <div x-show="lightbox" x-transition.opacity @keydown.escape.window="lightbox = false"
    class="fixed inset-0 bg-black/95 z-[200] flex items-center justify-center" style="display: none;">

    <button @click.stop="lightbox = false" class="absolute top-6 right-6 text-white text-4xl p-2 z-[210]">
      ✕
    </button>

    <div class="relative w-full max-w-6xl h-full flex items-center justify-between px-4 md:px-12 mx-auto"
      @click.self="lightbox = false">

      <button @click.stop="prev()" class="text-white text-5xl md:text-6xl p-4">
        ‹
      </button>

      <div class="flex-1 flex items-center justify-center overflow-hidden">
        <img :src="gallery[current]" class="max-w-full max-h-[80vh] object-contain rounded-xl shadow-2xl">
      </div>

      <button @click.stop="next()" class="text-white text-5xl md:text-6xl p-4">
        ›
      </button>

    </div>
  </div>

  <!-- ================= FOOTER ================= -->
  <footer class="fixed bottom-0 left-0 w-full h-12 bg-[#343a40] text-white
               flex items-center justify-center text-sm z-40">
    © 2026 | Prefeitura de Nova Venécia
  </footer>

 <script>
function tourismTemplate() {
  const params = new URLSearchParams(window.location.search)
  const id = params.get('id') || 'elefante'

  const data = LOCAIS[id] || LOCAIS.elefante

  return {
    lang: 'pt',
    lightbox: false,
    showMap: false,
    show360: false,
    current: 0,

    hero: data.hero,
    gallery: data.gallery || [],
    mapEmbed: data.location?.embed || '',
    qr: data.location?.qr || '',
    texts: data.texts,

    RAvisionButton: data.RAvisionButton || 'Veja em 360°',
    RAvisionScreen: !!data.RAvisionScreen,

    // NOVO SUPORTE FLEXÍVEL
    RAvisionlink: data.RAvisionlink || '',
    idnode: data.idnode || '',

    // TOUR 360 COM PRIORIDADE
    get tour360() {
      // 1. Se tiver link manual, usa ele
      if (this.RAvisionlink) {
        return this.RAvisionlink
      }
      // 3. fallback
      return ''
    },

    openLightbox(index) {
      this.current = index
      this.lightbox = true
    },

    next() {
      this.current = (this.current + 1) % this.gallery.length
    },

    prev() {
      this.current =
        (this.current - 1 + this.gallery.length) %
        this.gallery.length
    },

    get t() {
      return this.texts[this.lang] || this.texts.pt
    }
  }
}
</script>
</body>

</html>
