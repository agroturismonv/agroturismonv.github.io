<!DOCTYPE html>
<html lang="pt-BR" x-data="circuitApp()" x-init="start()">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circuito | Nova Venécia</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script src="../dados/controller.js"></script>

  <style>
    [x-cloak] { display: none !important; }
    
    /* Transição suave de zoom no card */
    .ponto-card img { transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .ponto-card:hover img { transform: scale(1.1); }
    
    /* Ajuste para o grid ocupar a altura toda sem sobras */
    .ponto-card { height: 100%; min-height: 40vh; }

    /* Scrollbar minimalista */
    .custom-scroll::-webkit-scrollbar { width: 5px; }
    .custom-scroll::-webkit-scrollbar-track { background: #000; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #0f5132; }
  </style>
</head>

<body class="bg-black text-white h-screen flex flex-col overflow-hidden">

<header class="bg-[#0f5132] text-white z-50 shadow-lg flex-shrink-0">
  <div class="grid grid-cols-3 items-center p-4 md:px-12 w-full">
    
    <div class="flex justify-start">
      <a href="../index.html" class="flex items-center gap-2 group hover:text-[#ffc107] transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
        </svg>
        <span class="text-xs md:text-sm font-bold uppercase tracking-widest" x-text="t.back"></span>
      </a>
    </div>

    <div class="text-center">
      <h1 class="text-sm md:text-xl font-black uppercase tracking-tighter truncate" 
          x-text="ready ? config.texts[lang].title : '...'"></h1>
    </div>

   <div class="flex justify-end gap-3">
  <button @click="setLang('pt')" :class="lang === 'pt'? 'scale-110' : 'opacity-60'">
    <span class="fi fi-br"></span>
  </button>
  
  <button @click="setLang('en')" :class="lang === 'en'? 'scale-110' : 'opacity-60'">
    <span class="fi fi-us"></span>
  </button>
  
  <button @click="setLang('es')" :class="lang === 'es'? 'scale-110' : 'opacity-60'">
    <span class="fi fi-es"></span>
  </button>
</div>

  </div>
</header>

  <main class="flex-1 overflow-y-auto bg-black custom-scroll" x-cloak x-show="ready">
    
    <div class="grid h-full w-full" 
     :class="pontos.length === 1 ? 'grid-cols-1' : 'md:grid-cols-2 grid-cols-1'">
  
  <template x-for="ponto in pontos" :key="ponto.id">
    <a :href="`local.html?id=${ponto.id}`" 
       class="ponto-card relative overflow-hidden border-b md:border-b-0 md:border-r border-gray-900 group flex-1">
      
      <img :src="ponto.hero" class="absolute inset-0 w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-all duration-700">
      
      <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>

      <div class="relative h-full flex flex-col items-center justify-center text-center p-8 z-10">
        <h2 class="text-4xl md:text-7xl font-black uppercase italic tracking-tighter drop-shadow-2xl transition-all"
            :class="pontos.length === 1 ? 'md:text-8xl' : 'md:text-6xl'"
            x-text="ponto.texts[lang].title"></h2>
        
        <p class="mt-4 text-sm md:text-xl font-light opacity-80 max-w-2xl line-clamp-3" 
           x-text="ponto.texts[lang].description"></p>

        <div class="mt-8 px-10 py-4 border-2 border-[#ffc107] text-[#ffc107] rounded-full font-black text-sm uppercase tracking-widest group-hover:bg-[#ffc107] group-hover:text-[#0f5132] transition-all">
          Explorar Local
        </div>
      </div>
    </a>
  </template>
</div>
  </main>

  <footer class="bg-[#1a1a1a] text-gray-400 py-3 px-6 md:px-12 border-t border-gray-800 flex-shrink-0">
    <div class="flex flex-col md:flex-row items-center justify-between gap-2 w-full">
      <div class="flex items-center gap-3">
        <img src="../imagens/brasao/brasao_nv.png" alt="Logo" class="w-8 opacity-50 grayscale">
        <div class="text-left border-l border-gray-700 pl-3">
          <p class="text-white font-bold text-xs">Prefeitura de Nova Venécia</p>
          <p class="text-[9px] uppercase tracking-widest opacity-50">Secretaria de Cultura</p>
        </div>
      </div>
      <div class="text-center md:text-right">
        <p class="text-white font-bold text-xs">© 2026 | Desenvolvido por IFES Campus Nova Venécia</p>
      </div>
    </div>
  </footer>

  <script>
    function circuitApp() {
      return {
      current: 0,
      lang: localStorage.getItem('user_lang') || 'pt', 
      slides: [],

        texts: {
      pt: { back: 'Voltar' },
      en: { back: 'Back' },
      es: { back: 'Volver' }
    },
    setLang(newLang) {
      this.lang = newLang;
      localStorage.setItem('user_lang', newLang);
    },
    get t() { return this.texts[this.lang] },

        start() {
          const popularPagina = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const circuitId = urlParams.get('id');
            
            // Monta o nome da variável CONFIG (Ex: CONFIG_PEDRA_ELEFANTE)
            const varConfig = "CONFIG_" + (circuitId ? circuitId.toUpperCase() : "");
            
            if (window[varConfig]) {
              this.config = window[varConfig];
              
              // CRITICAL FIX: Mapeia e FILTRA apenas locais que realmente existem e têm dados
              // Isso elimina o "Bloco Preto" se houver IDs errados no config.js
              this.pontos = this.config.locais
                .map(id => window.LOCAIS[id])
                .filter(p => p && p.texts && p.hero); 
              
              this.ready = true;
              console.log("Circuito carregado com sucesso:", circuitId);
            } else {
              console.error("Configuração não encontrada para:", varConfig);
            }
          };

          // Se os dados já estiverem no window, carrega. Se não, espera o evento do controller.
          if (window.LOCAIS && Object.keys(window.LOCAIS).length > 0) {
            popularPagina();
          } else {
            window.addEventListener('locais-ready', popularPagina);
          }
        }
      }
    }
  </script>
</body>
</html>
