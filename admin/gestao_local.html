<!DOCTYPE html>
<html lang="pt-BR" x-data="adminApp()" x-init="init()">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="../dados/controller.js"></script>

    <style>
        [x-cloak] { display: none !important; }

        .input-premium {
            width: 100%;
            padding: 1rem;
            background: #f9fafb;
            border-radius: 1rem;
            font-weight: 700;
            color: #0f5132;
        }

        .input-premium:focus {
            box-shadow: 0 0 0 2px #ffc107;
        }

        .label-premium {
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            color: #9ca3af;
            margin-left: 1rem;
        }
    </style>
</head>

<body class="bg-gray-100 p-6 md:p-12">
<div class="max-w-5xl mx-auto bg-white rounded-[3rem] shadow-2xl overflow-hidden">

<header class="bg-[#0f5132] p-10 text-white flex justify-between">
    <h2 class="text-2xl font-black uppercase italic">Painel</h2>

    <div class="flex bg-black/20 p-1 rounded-xl">
        <button @click="isRegiao = true"
            :class="isRegiao ? 'bg-[#ffc107] text-[#0f5132]' : ''"
            class="px-4 py-2 text-xs">Região</button>

        <button @click="isRegiao = false"
            :class="!isRegiao ? 'bg-[#ffc107] text-[#0f5132]' : ''"
            class="px-4 py-2 text-xs ml-2">Local</button>
    </div>
</header>

<div class="p-10 space-y-8">

<!-- IDS -->
<section class="grid md:grid-cols-2 gap-6">
    <div>

        <template x-if="isRegiao">
            <input x-model="id_regiao"
                   @input="id_regiao = sanitizarInput(id_regiao)"
                   placeholder="ID Região"
                   class="input-premium">
        </template>

        <template x-if="!isRegiao">
            <select x-model="id_regiao" class="input-premium">
                <option value="">Selecione</option>
                <template x-for="r in regioes">
                    <option :value="r.id" x-text="r.nome"></option>
                </template>
            </select>
        </template>

        <input x-model="id_local"
               @input="id_local = sanitizarInput(id_local)"
               placeholder="ID Local"
               class="input-premium mt-3">
    </div>

    <!-- MAP -->
    <div>
        <input x-model="map_link"
               placeholder="Link do Google Maps"
               class="input-premium">
    </div>
</section>

<!-- TEXTOS -->
<section class="grid md:grid-cols-2 gap-6">

    <div>
        <input x-model="pt.title" @blur="traduzir()" placeholder="Título" class="input-premium">
        <input x-model="pt.subtitle" @blur="traduzir()" placeholder="Subtítulo" class="input-premium mt-2">
        <textarea x-model="pt.desc" @blur="traduzir()" placeholder="Descrição"
                  class="input-premium mt-2"></textarea>
    </div>

    <div class="text-xs space-y-2">
        <div><b>EN:</b> <span x-text="en.title"></span></div>
        <div><b>ES:</b> <span x-text="es.title"></span></div>
        <div class="text-gray-400 italic">Tradução pode falhar — revise.</div>
    </div>
</section>

<!-- GALERIA -->
<input type="file" multiple @change="upload">

<!-- 360 -->
<div class="pt-6">
    <label><input type="checkbox" x-model="has360"> Possui 360º</label>

    <input x-show="has360"
           x-model="ra_link"
           class="input-premium mt-2"
           placeholder="https://novavenecia360.com.br/">
</div>

<!-- BOTÃO -->
<button @click="baixar()" class="w-full bg-[#0f5132] text-white p-4 mt-6">
    Baixar ZIP
</button>

</div>
</div>

<script>
function adminApp() {
    return {
        isRegiao: true,
        id_regiao: '',
        id_local: '',
        map_link: '',

        pt: { title: '', subtitle: '', desc: '' },
        en: { title: '', subtitle: '', desc: '' },
        es: { title: '', subtitle: '', desc: '' },

        fotos: [],
        regioes: [],

        has360: false,
        ra_link: 'https://novavenecia360.com.br/',

        sanitizarInput(t) {
            return t.replace(/\s/g, '_')
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, '');
        },

        gerarLinksMapa(link) {
            const encoded = encodeURIComponent(link);

            return {
                maps: link,
                embed: link + (link.includes('?') ? '&' : '?') + 'output=embed',
                qr: `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encoded}`
            };
        },

        upload(e) {
            this.fotos = Array.from(e.target.files);
        },

        async traduzir() {
            const traduz = async (texto, target) => {
                try {
                    const r = await fetch("https://libretranslate.de/translate", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            q: texto,
                            source: "pt",
                            target: target,
                            format: "text"
                        })
                    });
                    const data = await r.json();
                    return data.translatedText;
                } catch {
                    return '';
                }
            };

            this.en.title = await traduz(this.pt.title, "en");
            this.es.title = await traduz(this.pt.title, "es");
        },

        async baixar() {
            const zip = new JSZip();

            const localID = this.sanitizarInput(this.id_local || this.pt.title);
            const regiaoID = this.sanitizarInput(this.id_regiao);

            const mapa = this.gerarLinksMapa(this.map_link);

            const payload = {
                tipo: this.isRegiao ? 'regiao' : 'local',
                regiao: regiaoID,
                local: localID,
                cover_file: '',
                dados: {
                    id: localID,
                    location: mapa,
                    texts: {
                        pt: this.pt,
                        en: this.en,
                        es: this.es
                    },
                    gallery: this.fotos.map(f => f.name),
                    RAvisionScreen: this.has360,
                    RAvisionlink: this.has360 ? this.ra_link : ''
                }
            };

            zip.file("config.json", JSON.stringify(payload, null, 2));

            this.fotos.forEach(f => zip.file(f.name, f));

            const blob = await zip.generateAsync({ type: "blob" });

            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `pacote_${localID}.zip`;
            a.click();
        }
    }
}
</script>

</body>
</html>
