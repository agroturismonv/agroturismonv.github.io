<!DOCTYPE html>
<!-- Documento HTML5 -->
<html lang="pt-BR" x-data="sliderApp()" x-init="start()">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Turismo | Nova Venécia</title>

  <!-- Ícones de bandeiras -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- DADOS DOS LOCAIS -->
  <script src="dados/controller/locais.js"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<!-- ================= HEADER FIXO ================= -->
<header class="bg-[#0f5132] text-white fixed w-full z-50">
  <div class="flex justify-between items-center p-4 md:px-10">

    <a href="index.html" class="flex items-center gap-2 max-w-[70%]">
      <img src="imagens/brasao/brasao_nv.png" alt="Logo" class="w-8 flex-shrink-0">

      <h1 class="text-sm min-[400px]:text-base md:text-xl font-black uppercase tracking-tighter leading-tight">
        DESCOBRINDO O AGROTURISMO
      </h1> 
    </a>

    <!-- Seletor de idiomas -->
    <div class="flex gap-3 flex-shrink-0">
      <button @click="lang = 'pt'" :class="lang === 'pt'? 'opacity-100 scale-110' : 'opacity-60'">
        <span class="fi fi-br"></span>
      </button>

      <button @click="lang = 'en'" :class="lang === 'en'? 'opacity-100 scale-110' : 'opacity-60'">
        <span class="fi fi-us"></span>
      </button>

      <button @click="lang = 'es'" :class="lang === 'es'? 'opacity-100 scale-110' : 'opacity-60'">
        <span class="fi fi-es"></span>
      </button>
    </div>
  </div>
</header>

<!-- ================= SLIDER PRINCIPAL ================= -->
<section class="w-full h-screen overflow-hidden relative bg-black">

  <div class="h-full flex flex-col transition-transform duration-1000 ease-in-out"
       :style="`transform: translateY(-${current * 100}vh)`">

    <template x-for="(slide, i) in slides" :key="slide.id">
      <div class="h-[100vh] w-full relative flex items-center justify-center flex-shrink-0">

        <img :src="slide.cover"
             class="absolute inset-0 w-full h-full object-cover opacity-90">

        <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/80"></div>

        <div class="relative z-10 text-white text-center px-4 max-w-4xl">
          <h2 class="text-5xl md:text-8xl font-black tracking-tighter drop-shadow-2xl uppercase"
              x-text="slide.texts[lang]?.title || slide.texts.pt.title"></h2>

          <p class="mt-4 text-xl md:text-3xl font-light drop-shadow-lg"
             x-text="slide.texts[lang]?.subtitle || slide.texts.pt.subtitle"></p>

          <a :href="`local.html?id=${slide.id}`"
             class="inline-block mt-10 bg-[#ffc107] hover:bg-[#ffdb4d] text-[#0f5132]
                    px-10 py-4 rounded-full font-black text-xl transition-all transform hover:scale-110 shadow-2xl">
            <span x-text="t.explore"></span>
          </a>
        </div>
      </div>
    </template>
  </div>

  <!-- CONTROLES -->
  <div class="absolute right-2 md:right-8 top-1/2 -translate-y-1/2
              flex flex-col gap-3 md:gap-4 z-20 items-center">

    <button @click="prev()" class="text-white">▲</button>

    <template x-for="(slide, index) in slides" :key="slide.id">
      <button
        @click="current = index"
        class="w-2 md:w-3 rounded-full transition-all duration-300 self-end"
        :class="current === index
          ? 'h-6 md:h-12 bg-[#ffc107]'
          : 'h-3 md:h-4 bg-white/40 hover:bg-white/70'">
      </button>
    </template>

    <button @click="next()" class="text-white">▼</button>
  </div>
</section>

<!-- ================= APRESENTAÇÃO ================= -->
<section class="max-w-4xl mx-auto py-20 px-6 text-center">
  <h3 class="text-4xl md:text-5xl font-extrabold text-[#0f5132] mb-6" x-text="t.welcome"></h3>
  <div class="w-32 h-2 bg-[#ffc107] mx-auto rounded-full mb-8"></div>
  <p class="text-2xl text-gray-600 leading-relaxed font-light" x-text="t.desc"></p>
</section>

<!-- ================= RODAPÉ ================= -->
<footer class="bg-[#1a1a1a] text-gray-400 text-center p-10 border-t border-gray-800">
  <img src="imagens/brasao/brasao_nv.png" alt="Logo" class="mx-auto mb-4 w-12">

  <p class="text-white font-bold text-lg">Prefeitura Municipal de Nova Venécia</p>
  <p class="text-sm mt-2 italic">Espírito Santo, Brasil</p>
</footer>

<script>
function sliderApp() {
  return {
    current: 0,
    lang: 'pt',
    slides: Object.values(LOCAIS),

    texts: {
      pt: {
        explore: 'QUERO CONHECER',
        welcome: 'Descubra Nova Venécia',
        desc: 'Explore o destino mais surpreendente do Noroeste Capixaba.'
      },
      en: {
        explore: 'EXPLORE NOW',
        welcome: 'Discover Nova Venécia',
        desc: 'Explore the most surprising destination.'
      },
      es: {
        explore: 'QUIERO CONOCER',
        welcome: 'Descubra Nova Venécia',
        desc: 'Explore el destino más sorprendente.'
      }
    },

    get t() {
      return this.texts[this.lang]
    },

    next() {
      this.current = (this.current + 1) % this.slides.length
    },

    prev() {
      this.current = (this.current - 1 + this.slides.length) % this.slides.length
    },

    start() {
      this.timer = setInterval(() => this.next(), 5000)
    }
  }
}
</script>

</body>
</html>
